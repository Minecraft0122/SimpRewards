name: Rewards
version: 1.0.0
main: com.example.rewards.RewardsPlugin
api-version: 1.20
authors: [YourName]
description: 高性能Minecraft奖励插件，支持SQLite/MySQL，兼容Folia
depend: [Vault]
softdepend: [PlaceholderAPI]
commands:
  rewards:
    description: 打开奖励GUI
    usage: /<command> [reload|reset]
    permission: rewards.use
    aliases: [reward]
  rewardsreload:
    description: 重新加载插件配置
    usage: /<command>
    permission: rewards.reload
permissions:
  rewards.use:
    default: true
    description: 允许使用奖励系统
  rewards.reload:
    default: op
    description: 允许重新加载配置
  rewards.reset:
    default: op
    description: 允许重置玩家数据
