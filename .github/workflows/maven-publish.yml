name: Build SimpRewards Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Compile & Package Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 切换到 simprewards 目录进行构建
      - name: Build plugin
        run: |
          cd simprewards
          mvn -B clean package -DskipTests

      - name: Verify JAR output
        run: |
          ls -la simprewards/target/
          if ls simprewards/target/*.jar >/dev/null 2>&1; then
            echo "✅ JAR file generated"
          else
            echo "❌ No JAR file found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpRewards-plugin
          path: simprewards/target/*.jar
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: simprewards/target/*..jar
          tag_name: v1.0.${{ github.run_number }}
          name: SimpRewards v1.0.${{ github.run_number }}
          body: |
            🎉 自动构建完成！  
            - 构建编号: ${{ github.run_number }}
            - 提交: ${{ github.sha }}
            
            ⚙️ 构建环境：
            - Java: 17
            - Maven: latest
            - OS: Ubuntu latest

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
